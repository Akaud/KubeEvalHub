services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    image: ${BACKEND_IMAGE:-myapp-backend}:${TAG:-latest}
    container_name: ${BACKEND_CONTAINER:-backend}
    env_file:
      - ./backend/.env
    expose:
      - "${BACKEND_PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure:5
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    image: ${FRONTEND_IMAGE:-myapp-frontend}:${TAG:-latest}
    container_name: ${FRONTEND_CONTAINER:-frontend}
    env_file:
      - ./frontend/.env
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge