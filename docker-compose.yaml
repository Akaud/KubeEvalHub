services:
  backend:
    build:
      context: ./backend
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    image: ${BACKEND_IMAGE:-myapp-backend}:${TAG:-latest}
    container_name: ${BACKEND_CONTAINER:-backend}
    environment:
      PORT: ${BACKEND_PORT:-5000}
    expose:
      - "${BACKEND_PORT:-5000}"
    restart: on-failure:5
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    image: ${FRONTEND_IMAGE:-myapp-frontend}:${TAG:-latest}
    container_name: ${FRONTEND_CONTAINER:-frontend}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge